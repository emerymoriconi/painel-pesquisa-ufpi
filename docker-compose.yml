services:
  db:
    image: postgres:16-alpine
    container_name: painel_db
    environment:
      POSTGRES_USER: painel
      POSTGRES_PASSWORD: painel123
      POSTGRES_DB: pesquisa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "painel"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: painel_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://painel:painel123@db:5432/pesquisa
      SECRET_KEY: "chave-secreta-troque-em-producao-123456"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD_HASH: "$$2b$$12$$e9TD72CAWM0ogW9Ap2atqO8oBrAmtAsQyEWcPZj6MWz/rdqLtaH4."
      ULTIMA_ATUALIZACAO: "08/02/2026"
      ALLOWED_ORIGINS: "http://localhost"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/data/xlsx:/app/data/xlsx

  frontend:
    build: ./frontend
    container_name: painel_frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
